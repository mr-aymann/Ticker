name: Deploy to Elastic Beanstalk

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # Install Dependencies inside the backend directory
      - name: Install Dependencies
        run: npm install
        working-directory: ./backend

      # Zip the backend folder as the deployment package
      - name: Zip Application
        run: zip -r deploy.zip . -x "*.git*" -x "node_modules/*"
        working-directory: ./backend

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@0e613a0980cbf65ed5b322eb7a1e075d28913a83
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Deploy to Elastic Beanstalk
      - name: Deploy to EB
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: Ticker-Backend  # Set this as a GitHub secret
          environment_name: Ticker-Backend-env # Set this as a GitHub secret
          version_label: ${{ github.sha }} # Use commit SHA for versioning
          region: ${{ secrets.AWS_REGION }}
          deployment_package: ./backend/deploy.zip
